<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="160" rx="16" fill="url(#bg)"/>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="80" x2="800" y2="80" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="120" x2="800" y2="120" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="160" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="160" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="160" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <circle cx="60" cy="80" r="40" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <circle cx="60" cy="80" r="28" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>
  <text x="60" y="90" font-size="30" text-anchor="middle" fill="url(#text-grad)" filter="url(#glow)">&#9881;</text>
  <text x="400" y="75" font-family="Arial, sans-serif" font-size="46" font-weight="900" text-anchor="middle" fill="url(#text-grad)" filter="url(#glow)">NexusFlow</text>
  <text x="400" y="112" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#94a3b8" letter-spacing="4">AUTONOMOUS MULTI-CHANNEL CONTENT ENGINE</text>
  <circle cx="740" cy="80" r="40" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
  <text x="740" y="90" font-size="28" text-anchor="middle" fill="url(#text-grad)" filter="url(#glow)">&#128640;</text>
</svg>
